name: Issue Driven AI Agent
on:
  issues:
    types: [opened, edited]
  workflow_dispatch: # 🚀 これでActions画面に名前が強制浮上します！

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    if: contains(github.event.issue.title, '🤖') || contains(github.event.issue.title, '[AI]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Gemini
        id: ai
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const instruction = context.payload.issue.body;
            
            // 🔍 ディスクを直接見てsrc構成か通常構成かを自動判定
            let filePath = fs.existsSync("src/app/page.tsx") ? "src/app/page.tsx" : "app/page.tsx";
            if (instruction.includes("layout")) filePath = fs.existsSync("src/app/layout.tsx") ? "src/app/layout.tsx" : "app/layout.tsx";
            if (instruction.includes("global")) filePath = fs.existsSync("src/app/globals.css") ? "src/app/globals.css" : "app/globals.css";
            
            const currentContent = fs.existsSync(filePath) ? fs.readFileSync(filePath, 'utf8') : "";
            
            const systemInstruction = `あなたは佐藤さんの専属AIエンジニアです。対象ファイル「${filePath}」に対する修正コードを生成してください。元のインポートやレイアウトは絶対残し、指示部分だけ変更してください。出力はJSONフォーマットのみ。{"newContent": "修正後の全コード", "commitMessage": "コミットメッセージ", "prTitle": "PRタイトル"}`;
            
            // 🧠 佐藤さんの最強アセット「Gemini 1.5 Pro」を召喚（時間制限なしの無制限フルパワー！）
            const geminiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=' + process.env.GEMINI_API_KEY;
            
            const response = await fetch(geminiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: `${systemInstruction}\n\nユーザー指示:\n${instruction}\n\n現在のコード:\n${currentContent}` }] }],
                generationConfig: { responseMimeType: 'application/json', maxOutputTokens: 8192 }
              })
            });
            
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            
            let rawText = data.candidates
